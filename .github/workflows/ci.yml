name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - public/version.json
      - public/downloads/**
  pull_request:
    branches: [main]

# Cancel older runs for the same PR/branch to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - run: npm run lint

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - run: npm run security:audit

  coverage-tests:
    name: Unit, Integration & Coverage
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - run: npm run test:coverage:ci
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'http://localhost:54321' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'test-anon-key' }}
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [typecheck, lint, coverage-tests]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          VITE_DISABLE_AUTH: 'true'
          VITE_SUPABASE_URL: 'http://localhost:54321'
          VITE_SUPABASE_ANON_KEY: 'test-anon-key'
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, security-audit, coverage-tests, e2e-tests]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - name: Build
        run: npm run build
        env:
          # PRs from forks do not receive repo secrets; fall back to harmless values.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'http://localhost:54321' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'test-anon-key' }}
      - name: Generate version.json for update manifest
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
          const { execSync } = require('child_process');
          let commitCount = 0;
          try { commitCount = Number(execSync('git rev-list --count HEAD', {cwd: process.cwd()}).toString().trim()); } catch(e) { commitCount = 0; }
          const versionCode = commitCount + 1; // matches gradle tweak
          const data = {
            version: pkg.version,
            versionCode,
            gitSha: process.env.GITHUB_SHA || '',
            tag: process.env.GITHUB_REF_NAME || '',
            releasedAt: new Date().toISOString(),
            apkUrl: `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${process.env.GITHUB_REF_NAME}/bahati-${process.env.GITHUB_REF_NAME}.apk`,
            releaseNotes: `Release ${process.env.GITHUB_REF_NAME}`
          };
          fs.writeFileSync('public/version.json', JSON.stringify(data, null, 2));
          console.log('Generated version.json');
          NODE
      - name: Upload version.json artifact
        uses: actions/upload-artifact@v7
        with:
          name: version-json
          path: public/version.json
